<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quantica · Course Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --paper:#FCFEFB; --card:#FFFFFF; --ink:#16281B;
    --forest:#14532D; --moss:#1A9E4B; --grass:#22C55E; --lime:#C7F09A; --sage:#5FA06B;
    --btn:#39A85C; --btn-edge:#2C874A; --btn-hover:#33984f;
    --gray:#556A58; --gray-soft:#8AA084; --line:#E4EEDB; --line-2:#EDF6E4;
    --tint:#E8F5DE; --amber:#E7B44B;
    --ff-display:'Fraunces',Georgia,serif; --ff-body:'Inter',system-ui,sans-serif; --ff-ui:'Space Grotesk',var(--ff-body);
    --topbar:60px;
  }
  /* ===== Cove theme (Algebra I) — same layout, ocean palette ===== */
  :root[data-course="algebra1"]{
    --paper:#F6FBFE; --card:#FFFFFF; --ink:#123049;
    --forest:#1C5486; --moss:#2E7CC0; --grass:#4D9EDD; --lime:#BFE2F7; --sage:#6699C0;
    --btn:#3E8FCE; --btn-edge:#2E6FAE; --btn-hover:#3782C2;
    --gray:#4E6577; --gray-soft:#8AA1B6; --line:#DBE9F4; --line-2:#EAF3FB; --tint:#E4F1FB;
  }
  [data-course="algebra1"] .wnode{box-shadow:0 6px 0 #CFE1F1,0 12px 16px -9px rgba(18,40,60,.28)}
  [data-course="algebra1"] .wnode:active{box-shadow:0 2px 0 #CFE1F1,0 8px 12px -8px rgba(18,40,60,.28)}
  [data-course="algebra1"] .wnode.done{box-shadow:0 6px 0 #2E6FAE,0 12px 16px -9px rgba(18,40,60,.3)}
  [data-course="algebra1"] .wnode.done:active{box-shadow:0 2px 0 #2E6FAE,0 8px 12px -8px rgba(18,40,60,.3)}
  [data-course="algebra1"] .wnode.current{box-shadow:0 6px 0 #2E6FAE,0 0 0 7px rgba(77,158,221,.16),0 14px 22px -10px rgba(18,40,60,.4);animation-name:breathe-cove}
  @keyframes breathe-cove{0%,100%{box-shadow:0 6px 0 #2E6FAE,0 0 0 7px rgba(77,158,221,.16),0 14px 22px -10px rgba(18,40,60,.4)}50%{box-shadow:0 6px 0 #2E6FAE,0 0 0 12px rgba(77,158,221,.08),0 14px 22px -10px rgba(18,40,60,.4)}}
  [data-course="algebra1"] .wtrail .track path{stroke:#BFD9F0}
  [data-course="algebra1"] .avatar{background:#DCEDFB;border-color:#B9D6F0}
  [data-course="algebra1"] .avatar svg{stroke:#2E6FAE}
  [data-course="algebra1"] .sbar{background:#E1EDF7}
  [data-course="algebra1"] .nextup .gbar{background:#D6E7F6}
  [data-course="algebra1"] .gtoolbar .seeds{border-color:#C3DBF1}
  [data-course="algebra1"] .shop-item{background:#F2F8FD}
  [data-course="algebra1"] .sig .ring{background:conic-gradient(var(--grass) 0%, #CFE1F1 0)}
  body{font-family:var(--ff-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:clip}
  .eyebrow{font-family:var(--ff-ui);font-size:.64rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--sage)}

  /* pressable premium */
  .lift{cursor:pointer;transition:transform .13s cubic-bezier(.3,.8,.4,1),box-shadow .13s ease}
  .lift:hover{transform:translateY(-2px)}.lift:active{transform:translateY(0)}
  .cta3d{cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:9px;background:var(--btn);color:#fff;font-family:var(--ff-ui);font-weight:600;border-radius:14px;box-shadow:0 4px 0 var(--btn-edge),0 12px 22px -12px rgba(20,50,25,.42);transition:transform .09s ease,box-shadow .09s ease,background .12s ease}
  .cta3d:hover{background:var(--btn-hover)}
  .cta3d:active{transform:translateY(4px);box-shadow:0 0 0 var(--btn-edge)}
  @media(prefers-reduced-motion:reduce){.lift,.cta3d{transition:none}.lift:hover{transform:none}}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:60;height:var(--topbar);display:flex;align-items:center;gap:16px;padding:0 22px;background:color-mix(in srgb,var(--paper) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-2)}
  .brand{display:flex;align-items:center;gap:8px;font-family:var(--ff-display);font-weight:600;font-size:1.12rem;color:var(--forest);text-decoration:none}
  .brand svg{width:22px;height:22px}
  .coursesel{position:relative}
  .coursesel .cur{display:inline-flex;align-items:center;gap:6px;font-family:var(--ff-ui);font-weight:600;font-size:.8rem;color:var(--forest);background:var(--tint);border:1px solid #CFEAC6;padding:5px 10px;border-radius:999px;cursor:pointer}
  [data-course="algebra1"] .coursesel .cur{border-color:#BFDCF3}
  .coursesel .cur .cv{transition:transform .15s ease}
  .coursesel.open .cur .cv{transform:rotate(180deg)}
  .coursesel .menu{position:absolute;top:calc(100% + 8px);left:0;min-width:216px;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 22px 50px -20px rgba(20,50,25,.34);padding:9px;display:none;z-index:80}
  .coursesel.open .menu{display:block}
  .coursesel .menu .mh{font-family:var(--ff-ui);font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-soft);padding:6px 10px 4px}
  .coursesel .menu a{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:13px;font-size:.86rem;color:var(--ink);text-decoration:none;font-weight:500}
  .coursesel .menu a:hover{background:var(--tint)}
  .coursesel .menu a.on{color:var(--forest);font-weight:600}
  .coursesel .menu a.soon{color:var(--gray-soft)}
  .coursesel .menu a .tag{font-family:var(--ff-ui);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-soft)}
  .coursesel .menu a.on .tag{color:var(--moss)}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .sig{display:flex;align-items:center;gap:7px;font-family:var(--ff-ui);font-size:.79rem;color:var(--gray)}
  .sig b{color:var(--ink);font-weight:600}
  .sig .ring{width:24px;height:24px;border-radius:50%;background:conic-gradient(var(--grass) 0%, #D7E7CC 0);display:grid;place-items:center}
  .sig .ring i{width:17px;height:17px;border-radius:50%;background:var(--card)}
  .streak{display:flex;align-items:center;gap:5px;font-family:var(--ff-ui);font-size:.79rem;color:var(--gray)}
  .streak b{color:var(--ink);font-weight:600}
  .avatar{width:32px;height:32px;border-radius:50%;background:#E7F4DA;border:1px solid #C6E1B4;display:grid;place-items:center;cursor:pointer}
  .avatar svg{width:22px;height:22px}
  @media(max-width:860px){.sig{display:none}}
  @media(max-width:520px){.tb-right .sig,.streak{display:none}.topbar{padding:0 14px;gap:12px}}

  /* shell: chapter rail | main | rail */
  .shell{max-width:1180px;margin:0 auto;padding:22px 22px 60px;display:grid;grid-template-columns:60px 1fr 296px;gap:22px;align-items:start}
  @media(max-width:860px){.shell{grid-template-columns:1fr;gap:20px}.chrail{display:none}}
  main{position:relative;min-width:0}

  /* chapter rail */
  .chrail{position:sticky;top:calc(var(--topbar) + 20px);max-height:calc(100vh - var(--topbar) - 44px);overflow-y:auto;display:flex;flex-direction:column;gap:8px;align-items:center;scrollbar-width:none}
  .chrail::-webkit-scrollbar{display:none}
  .chrail .rl{font-family:var(--ff-ui);font-size:.56rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-soft);margin-bottom:2px}
  .chdot{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-family:var(--ff-ui);font-weight:600;font-size:.85rem;background:var(--card);border:1.5px solid var(--line);color:var(--gray);cursor:pointer;text-decoration:none;transition:transform .1s,border-color .12s,color .12s}
  .chdot:hover{transform:translateY(-2px);border-color:var(--grass);color:var(--forest)}
  .chdot.active{background:var(--moss);color:#fff;border-color:var(--moss)}
  .chdot.done{border-color:var(--grass);color:var(--moss)}
  @media(max-width:860px){.chrail{display:none}}

  /* continue card */
  .continue{position:relative;overflow:visible;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px 26px;box-shadow:0 16px 34px -26px rgba(20,50,25,.34)}
  .continue .eyebrow{color:var(--sage)}
  .continue .lz{font-family:var(--ff-ui);font-size:.76rem;color:var(--gray-soft);margin-top:10px}
  .continue h2{font-family:var(--ff-display);font-weight:600;font-size:clamp(1.4rem,2.6vw,1.85rem);line-height:1.08;margin:4px 0 4px;color:var(--forest);max-width:24ch}
  .continue p{font-size:.92rem;color:var(--gray);max-width:38ch}
  .continue .cbtn{margin-top:16px;font-size:1rem;padding:13px 24px}
  .continue .spot{position:absolute;right:24px;bottom:24px;width:128px;height:150px}
  .continue .spot img{position:absolute;right:0;bottom:0;height:100%;width:auto}
  @media(max-width:620px){.continue h2{max-width:16ch}}
  @media(max-width:520px){.continue .spot{display:none}.continue h2{max-width:none}}

  .path-head{margin:26px 2px 8px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .path-head h3{font-family:var(--ff-display);font-weight:600;font-size:1.28rem;color:var(--ink)}
  .path-head .h{font-family:var(--ff-ui);font-size:.72rem;color:var(--gray-soft)}
  .order-note{font-size:.8rem;color:var(--gray-soft);margin:0 2px 4px;display:flex;align-items:center;gap:6px}
  .order-note svg{width:14px;height:14px;color:var(--sage);flex:none}

  /* chapter card */
  .chapter{position:relative;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px 22px 20px;text-align:center;box-shadow:0 16px 34px -28px rgba(20,50,25,.4)}
  .chapter .cnum{font-family:var(--ff-display);font-weight:700;font-size:clamp(1.9rem,4.4vw,2.5rem);color:var(--forest);line-height:1}
  .chapter .csub{font-size:.98rem;color:var(--gray);margin-top:5px}
  .chapter .sprig{margin-top:10px;display:inline-block}
  .chapter .prog{margin-top:14px;display:flex;align-items:center;gap:10px;justify-content:center}
  .chapter .prog .bar{width:150px;height:7px;border-radius:5px;background:#E7F1E0;overflow:hidden}
  .chapter .prog .bar i{display:block;height:100%;background:var(--grass);border-radius:5px}
  [data-course="algebra1"] .chapter .prog .bar{background:#DCEBF9}
  .chapter .prog .pt{font-family:var(--ff-ui);font-size:.74rem;font-weight:600;color:var(--moss)}

  /* winding trail */
  .wtrail{position:relative;width:100%;max-width:600px;margin:10px auto 4px;aspect-ratio:100/150}
  .wtrail .track{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:1}
  .wtrail .track path{fill:none;stroke:#C7DEB6;stroke-width:2.4;stroke-dasharray:2.5 11;stroke-linecap:round;vector-effect:non-scaling-stroke}
  .wbot{position:absolute;pointer-events:none;z-index:0}
  /* --- garden: toolbar, placed items, greenhouse shop, toast --- */
  .gtoolbar{display:flex;align-items:center;gap:9px;margin:16px 2px 0;flex-wrap:wrap}
  .gtoolbar .seeds{display:inline-flex;align-items:center;gap:5px;font-family:var(--ff-ui);font-weight:600;font-size:.82rem;color:var(--forest);background:var(--tint);border:1px solid #CFEAC6;border-radius:999px;padding:6px 13px}
  .gbtn{font-family:var(--ff-ui);font-weight:600;font-size:.8rem;border-radius:10px;padding:7px 13px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--forest);display:inline-flex;align-items:center;gap:6px;transition:border-color .12s,color .12s,background .12s,transform .08s}
  .gbtn:hover{border-color:var(--grass);background:var(--tint)}
  .gbtn:active{transform:translateY(1px)}
  .gbtn.on{background:var(--moss);color:#fff;border-color:var(--moss)}
  .gitem{position:absolute;transform:translate(-50%,-50%);z-index:2;font-size:clamp(22px,4.4vw,32px);line-height:1;filter:drop-shadow(0 4px 4px rgba(20,50,25,.22));user-select:none;pointer-events:none;touch-action:none}
  .wtrail.editing .gitem{pointer-events:auto;cursor:grab;z-index:6;outline:2px dashed rgba(67,176,99,.55);outline-offset:3px;border-radius:8px}
  .wtrail.editing .gitem:active{cursor:grabbing}
  .grm{display:none}
  .wtrail.editing .grm{display:grid;place-items:center;position:absolute;top:-11px;right:-11px;width:20px;height:20px;border-radius:50%;border:1.5px solid #fff;background:#E1584B;color:#fff;font-size:13px;line-height:1;cursor:pointer;padding:0;box-shadow:0 2px 5px rgba(0,0,0,.25)}
  .gtoast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);background:var(--forest);color:#fff;font-family:var(--ff-ui);font-size:.84rem;font-weight:500;padding:11px 18px;border-radius:12px;box-shadow:0 14px 30px -12px rgba(20,50,25,.55);z-index:120;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:90vw;text-align:center}
  .gtoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .shop-ov{position:fixed;inset:0;background:rgba(12,30,18,.44);display:none;place-items:center;z-index:110;padding:20px}
  .shop-ov.open{display:grid}
  .shop{background:var(--card);border-radius:20px;padding:22px 22px 24px;max-width:460px;width:100%;box-shadow:0 30px 70px -24px rgba(20,50,25,.5);max-height:88vh;overflow:auto}
  .shop-head{display:flex;align-items:center;gap:12px}
  .shop-head h3{font-family:var(--ff-display);font-weight:600;font-size:1.3rem;color:var(--forest);flex:1}
  .shop-bal{font-family:var(--ff-ui);font-weight:700;font-size:.9rem;color:var(--forest);background:var(--tint);border-radius:999px;padding:5px 12px}
  .shop-x{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--gray);font-size:18px;cursor:pointer;line-height:1}
  .shop-x:hover{border-color:var(--grass);color:var(--forest)}
  .shop-sub{font-size:.84rem;color:var(--gray);margin:8px 0 16px;line-height:1.5}
  .shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
  .shop-item{border:1px solid var(--line);border-radius:14px;padding:12px 8px 11px;text-align:center;background:#F7FBF3}
  .shop-item.locked{opacity:.62}
  .si-e{font-size:30px;line-height:1;filter:drop-shadow(0 3px 3px rgba(20,50,25,.18))}
  .si-n{font-family:var(--ff-ui);font-size:.72rem;color:var(--ink);margin:6px 0 8px;font-weight:500}
  .si-buy{font-family:var(--ff-ui);font-weight:700;font-size:.76rem;color:#fff;background:var(--moss);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;width:100%}
  .si-buy:hover{filter:brightness(1.06)}
  .si-buy.cant{background:#C6D6BE;cursor:not-allowed}
  .si-lock{font-family:var(--ff-ui);font-size:.66rem;color:var(--gray-soft);padding:6px 0}
  @media(max-width:560px){.shop-grid{grid-template-columns:repeat(2,1fr)}}
  .wnode{position:absolute;transform:translate(-50%,-50%);z-index:3;width:66px;height:66px;border-radius:50%;display:grid;place-items:center;font-family:var(--ff-display);font-weight:600;font-size:1.18rem;background:var(--card);border:2px solid var(--line);color:var(--forest);box-shadow:0 6px 0 #E6EEDD,0 12px 16px -9px rgba(20,50,25,.28);cursor:pointer;text-decoration:none;transition:box-shadow .1s ease,transform .1s ease}
  .wnode:hover{box-shadow:0 8px 0 #E6EEDD,0 16px 20px -10px rgba(20,50,25,.32)}
  .wnode:active{transform:translate(-50%,calc(-50% + 4px));box-shadow:0 2px 0 #E6EEDD,0 8px 12px -8px rgba(20,50,25,.28)}
  .wnode.done{background:var(--grass);border-color:var(--grass);color:#fff;box-shadow:0 6px 0 #2f8f4c,0 12px 16px -9px rgba(20,50,25,.3)}
  .wnode.done:active{box-shadow:0 2px 0 #2f8f4c,0 8px 12px -8px rgba(20,50,25,.3)}
  .wnode.current{background:var(--grass);border-color:var(--lime);color:#0c2b16;box-shadow:0 6px 0 #2f8f4c,0 0 0 7px rgba(67,176,99,.16),0 14px 22px -10px rgba(20,50,25,.4);animation:breathe 3.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{box-shadow:0 6px 0 #2f8f4c,0 0 0 7px rgba(67,176,99,.16),0 14px 22px -10px rgba(20,50,25,.4)}50%{box-shadow:0 6px 0 #2f8f4c,0 0 0 12px rgba(67,176,99,.08),0 14px 22px -10px rgba(20,50,25,.4)}}
  .wnode .badge{position:absolute;top:-4px;right:-4px;width:23px;height:23px;border-radius:50%;display:grid;place-items:center;background:var(--moss);border:2px solid var(--paper)}
  .wnode .badge svg{width:12px;height:12px}
  .wnode .cta{position:absolute;top:-23px;left:50%;transform:translateX(-50%);font-family:var(--ff-ui);font-weight:600;font-size:.58rem;letter-spacing:.09em;text-transform:uppercase;color:var(--moss);white-space:nowrap}
  .wlabel{position:absolute;transform:translateY(-50%);z-index:2;font-size:.88rem;line-height:1.2;color:var(--ink);font-weight:500;max-width:31%}
  .wlabel.l{text-align:right;max-width:31%}.wlabel.r{text-align:left}
  .wlabel .s{display:block;font-family:var(--ff-ui);font-size:.57rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-soft);margin-top:2px;font-weight:600}
  .wlabel.cur{color:var(--forest);font-weight:600}
  .wsub{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .wlabel.l .wsub{justify-content:flex-end}
  .wsub a{display:inline-flex;align-items:center;gap:4px;font-family:var(--ff-ui);font-size:.58rem;font-weight:600;letter-spacing:.02em;color:var(--moss);background:var(--tint);border:1px solid #CFEAC6;border-radius:999px;padding:2px 8px 2px 7px;text-decoration:none;white-space:nowrap;transition:background .12s,transform .1s,box-shadow .12s}
  .wsub a svg{width:10px;height:10px}
  .wsub a:hover{background:#DBF0CD;transform:translateY(-1px)}
  .wsub a.ch{color:#8A5A00;background:#FBF1DA;border-color:#EAD9AE}
  .wsub a.ch:hover{background:#F6E7C2}
  .wsub a.done-c{opacity:.62}
  @media(prefers-reduced-motion:reduce){.wnode{transition:none}.wnode.current{animation:none}}
  @media(max-width:560px){.wtrail{max-width:100%;aspect-ratio:100/192}.wlabel,.wlabel.l{max-width:26%}.wlabel{font-size:.75rem}.wnode{width:48px;height:48px;font-size:.9rem}}

  .wnode-set{font-size:0}
  .wnode-set svg{width:26px;height:26px}
  .wnode-set.practice{background:var(--tint);border-color:var(--grass);color:var(--moss)}
  .wnode-set.challenge{background:#FBF1DA;border-color:#EAD9AE;color:#8A5A00}
  /* next-up card */
  .nextup{margin-top:22px;display:flex;align-items:center;gap:18px;background:linear-gradient(160deg,#F1FAE7,#E7F4D8);border:1px solid #D7EBC7;border-radius:20px;padding:18px 22px;box-shadow:0 16px 34px -28px rgba(20,50,25,.34)}
  .nextup .nu-ic{flex:none;width:46px;height:46px;border-radius:12px;background:var(--card);border:1px solid #D7EBC7;display:grid;place-items:center;color:var(--moss)}
  .nextup .nu-ic svg{width:24px;height:24px}
  .nextup .nu-tx{flex:1;min-width:0}
  .nextup .ge{font-family:var(--ff-ui);font-size:.6rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sage)}
  .nextup h3{font-family:var(--ff-display);font-weight:600;font-size:1.18rem;color:var(--ink);margin:2px 0 8px}
  .nextup .gbar{height:8px;border-radius:6px;background:#DDECCD;overflow:hidden;max-width:280px}
  .nextup .gbar i{display:block;height:100%;border-radius:6px;background:var(--grass)}
  .nextup .nu-cta{flex:none;font-size:.9rem;padding:11px 18px}
  @media(max-width:560px){.nextup{flex-direction:column;text-align:center;align-items:stretch}.nextup .gbar{max-width:none}}

  /* rail */
  .rail{position:sticky;top:calc(var(--topbar) + 20px);display:flex;flex-direction:column;gap:16px}
  @media(max-width:860px){.rail{position:static}}
  .rc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:17px 18px;box-shadow:0 10px 24px -22px rgba(20,50,25,.3)}
  .rc h4{font-family:var(--ff-ui);font-size:.66rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--gray-soft);margin-bottom:12px}
  .rc p.lead{font-size:.88rem;color:var(--gray);line-height:1.5;margin-bottom:14px}

<script>
(function(){
  // Course-aware home: Prealgebra is Sprout (green), Algebra I is Cove (blue). Same page, re-themed.
  var _params=new URLSearchParams(location.search);
  var COURSE=(_params.get('course')||localStorage.getItem('quantica.course')||'prealgebra');
  if(COURSE!=='prealgebra'&&COURSE!=='algebra1') COURSE='prealgebra';
  try{ localStorage.setItem('quantica.course',COURSE); }catch(e){}
  document.documentElement.setAttribute('data-course',COURSE);
  var IS_ALG=(COURSE==='algebra1');
  var GUIDE=IS_ALG?'Cove':'Sprout';
  var MASCOT=IS_ALG?'assets/cove/cove-hero.png':'assets/spot/spot-hero.png';
  var COURSE_NAME=IS_ALG?'Algebra I':'Prealgebra';
  var STREAK_ICO=IS_ALG?'🌊':'🌱';
  var CHECK='<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  var TARGET='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="7.5"/><circle cx="12" cy="12" r="2.5"/></svg>';
  var TROPHY='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v4a6 6 0 0 1-12 0zM10 20h4M12 20v-5"/></svg>';
  var BOLT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>';
  var SPRIG_LEAF='<svg width="52" height="19" viewBox="0 0 54 20" aria-hidden="true"><path d="M27 19 C27 12 27 8 27 3" stroke="#6FAE5A" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M27 9 C20 4 12 5 8 10 C15 15 23 14 27 9Z" fill="#8FC275"/><path d="M27 7 C34 3 42 4 46 9 C39 14 31 12 27 7Z" fill="#7FB565"/></svg>';
  var SPRIG_WAVE='<svg width="52" height="16" viewBox="0 0 54 16" aria-hidden="true"><path d="M2 10 C9 3 15 3 22 10 C29 17 35 17 42 10 C46 6 50 6 52 8" stroke="#4D9EDD" stroke-width="2.4" fill="none" stroke-linecap="round"/><path d="M2 6 C9 0 15 0 22 6" stroke="#A9D8F7" stroke-width="2" fill="none" stroke-linecap="round" opacity=".8"/></svg>';
  var SPRIG=IS_ALG?SPRIG_WAVE:SPRIG_LEAF;

  var state={ chapters:[], active:1, done:{}, current:'1.1', skill:{}, stats:{}, typeSkill:{} };

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function url(k){ return '/landing.html?course='+COURSE+'&lesson='+k; }
  function psetUrl(ch,type){ return '/landing.html?course='+COURSE+'&pset='+ch+'&ptype='+type; }
  function nonTeaching(t){ return /checkpoint|summary/i.test(t||''); }
  function chById(n){ for(var i=0;i<state.chapters.length;i++){ if(state.chapters[i].n===n) return state.chapters[i]; } return state.chapters[0]; }
  function chOf(k){ for(var i=0;i<state.chapters.length;i++){ var c=state.chapters[i]; for(var j=0;j<c.lessons.length;j++){ if(c.lessons[j].k===k) return c; } } return state.chapters[0]; }
  function lesOf(k){ var c=chOf(k); for(var j=0;j<c.lessons.length;j++){ if(c.lessons[j].k===k) return c.lessons[j]; } return c.lessons[0]; }
  function chDone(c){ return c.lessons.every(function(l){ return state.done[l.k]; }); }

  // Read the SAME progress the course app saves (localStorage 'quantica.profile.v1'),
  // so the home reflects where the student actually is instead of always showing 1.1.
  function loadProgress(){
    var P={}; try{ P=JSON.parse(localStorage.getItem('quantica.profile.v1'))||{}; }catch(e){ P={}; }
    var lessons=P.lessons||{}, done={}, pre=COURSE+':';
    Object.keys(lessons).forEach(function(k){ if(k.indexOf(pre)===0){ done[k.slice(pre.length)]=true; } });
    return { done:done, xp:P.xp||0, gems:P.gems||0, streak:P.streak||0, lastActive:P.lastActive||null, skill:P.skill||{}, stats:P.stats||{}, typeSkill:P.typeSkill||{} };
  }
  // the lesson the student is on = first not-yet-completed lesson in course order (or the last, if all done)
  function firstUndone(){
    for(var i=0;i<state.chapters.length;i++){ var L=state.chapters[i].lessons;
      for(var j=0;j<L.length;j++){ if(!state.done[L[j].k]) return L[j].k; } }
    var lc=state.chapters[state.chapters.length-1]; return lc.lessons[lc.lessons.length-1].k;
  }

  // "Days you showed up" — a scrollable 2-week (14-day) calendar. Green = a day you were active
  // (derived from the app's streak run), the ring marks today. Arrows page back through past weeks.
  var DayGrid=(function(){
    var off=0, active={}, streakN=0, ready=false;
    var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function iso(d){ var m=d.getMonth()+1, day=d.getDate(); return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day; }
    function init(streak,lastActive){
      active={}; streakN=streak||0; off=0; ready=true;
      if(lastActive && streak>0){ var base=new Date(lastActive+'T00:00:00');
        for(var i=0;i<streak;i++){ var d=new Date(base); d.setDate(base.getDate()-i); active[iso(d)]=true; } }
    }
    function winStart(o){ var t=new Date(); t.setHours(0,0,0,0);
      var end=new Date(t); end.setDate(t.getDate()-t.getDay()+6);   // Saturday of the current week
      var s=new Date(end); s.setDate(end.getDate()-13-14*o); return s; }   // 14-day window, paged by o
    function render(){
      var el=document.getElementById('dayCard'); if(!el||!ready) return;
      var s=winStart(off), todayISO=iso(new Date()), e=new Date(s); e.setDate(s.getDate()+13);
      var range=MON[s.getMonth()]+' '+s.getDate()+' – '+MON[e.getMonth()]+' '+e.getDate();
      var wk=''; ['S','M','T','W','T','F','S'].forEach(function(l){ wk+='<span class="dw">'+l+'</span>'; });
      var cells='';
      for(var i=0;i<14;i++){ var d=new Date(s); d.setDate(s.getDate()+i); var di=iso(d);
        cells+='<span class="daydot'+(active[di]?' on':'')+(di===todayISO?' today':'')+(di>todayISO?' fut':'')+'" title="'+di+'"></span>'; }
      el.innerHTML='<div class="dhead"><h4>Days you showed up</h4><div class="dnav">'+
          '<button id="dPrev" aria-label="Earlier weeks">&lsaquo;</button>'+
          '<button id="dNext" aria-label="Later weeks"'+(off===0?' disabled':'')+'>&rsaquo;</button></div></div>'+
        '<div class="drange">'+range+'</div>'+
        '<div class="dweek">'+wk+'</div>'+
        '<div class="daysgrid">'+cells+'</div>'+
        '<div class="days-cap"><span aria-hidden="true">'+STREAK_ICO+'</span> '+
          (streakN>0?('<b>'+streakN+'-day</b>&nbsp;streak'):'<b>Day 1</b>&nbsp;starts today')+'</div>';
      var p=document.getElementById('dPrev'), n=document.getElementById('dNext');
      if(p) p.onclick=function(){ off++; render(); };
      if(n) n.onclick=function(){ if(off>0){ off--; render(); } };
    }
    return { init:init, render:render };
  })();

  // The garden: earn Seeds from problems, buy decorations, and drag them anywhere on your trail.
  // Themed per course — a plant Greenhouse for Sprout, an ocean Tide pool for Cove. Placements are
  // saved per course+chapter; Seeds live in the shared profile.
  var Garden=(function(){
    var KEY='quantica.garden.v1', PKEY='quantica.profile.v1';
    var CATALOGS={
      prealgebra:{ shop:'🪴 Greenhouse', sub:'Spend Seeds you earn from problems to grow your trail. Keep learning to unlock more.',
        items:[
          {id:'sprout',e:'🌱',n:'Sprout',c:3,lock:0},{id:'fern',e:'🌿',n:'Fern',c:4,lock:0},
          {id:'clover',e:'🍀',n:'Clover',c:4,lock:0},{id:'rock',e:'🪨',n:'Mossy rock',c:5,lock:0},
          {id:'daisy',e:'🌼',n:'Daisy',c:5,lock:1},{id:'tulip',e:'🌷',n:'Tulip',c:6,lock:1},

  function masteryRows(){

      var k=fullK.slice(pre.length);

        for(var j=0;j<L.length;j++){ if(L[j].k===k){ les=L[j]; chn=C; break; } } }

  function hstr(s){ var h=0; s=String(s); for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
  function pct100(vals, total){                            // integer percentages that always sum to 100 (largest-remainder rounding)
    if(!total) return vals.map(function(){return 0;});
    var raw=vals.map(function(v){return v/total*100;});
    var fl=raw.map(function(r){return Math.floor(r);});
    var rem=100-fl.reduce(function(a,b){return a+b;},0);
    var ord=raw.map(function(r,i){return {i:i,f:r-Math.floor(r)};}).sort(function(a,b){return b.f-a.f;});
    for(var k=0;k<rem && k<ord.length;k++){ fl[ord[k].i]++; }
    return fl;
  }
  // real per-type accuracy from P.typeSkill: the type's own EMA shrunk toward the topic mastery,
  // so it starts near the topic average and sharpens as attempts accumulate (stable with few samples).
  function qtypesFor(r){
    var ts=state.typeSkill||{}, pre=COURSE+':'+r.lk+':', k=2, out=[];
    Object.keys(ts).forEach(function(key){
      if(key.indexOf(pre)!==0) return;
      var e=ts[key]; if(!e||!(e.n>0)) return;
      var pct=Math.round(100*(e.n*e.s + k*r.s)/(e.n + k));   // n·s_type + k·m_topic over n + k
      out.push({ t:e.label||key.slice(pre.length), acc:Math.max(1,Math.min(100,pct)), n:e.n });
    });
    out.sort(function(a,b){ return b.acc-a.acc; });
    return out;
  }

    var qtHTML = qtRows.length
      ? qtRows.slice(0,8).map(function(x){
          var chips=x.types.map(function(q){ return '<span class="qt-chip '+qchipCls(q.acc)+'">'+esc(q.t)+' <b class="qa">'+q.acc+'%</b></span>'; }).join('');
          return '<div class="qt-topic"><div class="qt-nm">'+esc(x.r.name)+'</div><div class="qt-chips">'+chips+'</div></div>';
        }).join('')
      : '<p class="pg-note" style="margin-top:2px">Solve a handful of problems and your right/wrong split by problem type shows up here.</p>';
    var qtNote = qtRows.length ? '<p class="pg-note">From your actual solves. A new type leans on the topic average until you&rsquo;ve done a few, so early numbers stay honest.</p>' : '';
    var SP=[38,44,41,55,50,58,63,60,71,avg];
    var chart=SP.map(function(h,i){ return '<i style="height:'+Math.max(8,Math.min(100,h))+'%"'+(i===SP.length-1?' class="cur"':'')+'></i>'; }).join('');
    var focusHTML=focus.length? focus.map(function(r){ return '<div class="pg-focus-row"><span class="fnm">'+esc(r.name)+'</span><span class="fpct">'+Math.round(r.s*100)+'%</span><a class="fgo" href="'+url(r.lk)+'">Practice &rarr;</a></div>'; }).join('')
      : '<div class="pg-focus-row"><span class="fnm" style="color:var(--gray-soft);font-weight:500">You&rsquo;re solid across the board — keep it up.</span></div>';
    var strongHTML=strong.map(function(r){ return '<div class="pg-focus-row"><span class="fnm">'+esc(r.name)+'</span><span class="slab">'+strLabel(r.s)+'</span><span class="fpct" style="color:var(--forest)">'+Math.round(r.s*100)+'%</span></div>'; }).join('');
    // how you solve — clean vs. hint vs. solution (real, from P.stats)
    // clean / with-a-hint (any number of hints) / saw-solution — a partition of every graded solve, so it always totals 100%
    var solsN=st.solutions||0, hintN=Math.max(0, solved-indep-solsN);
    var sp=pct100([indep,hintN,solsN], solved), pClean=sp[0], pHint=sp[1], pSol=sp[2];
    var solveHTML = solved
      ? '<div class="solvebar">'+
          (pClean?'<span class="sb-seg sb-clean" style="width:'+pClean+'%"></span>':'')+
          (pHint?'<span class="sb-seg sb-hint" style="width:'+pHint+'%"></span>':'')+
          (pSol?'<span class="sb-seg sb-sol" style="width:'+pSol+'%"></span>':'')+
        '</div>'+
        '<div class="sb-legend"><span><i class="sb-clean"></i>Clean <b>'+pClean+'%</b></span>'+
          '<span><i class="sb-hint"></i>With a hint <b>'+pHint+'%</b></span>'+
          '<span><i class="sb-sol"></i>Saw solution <b>'+pSol+'%</b></span></div>'
      : '<p class="pg-note">Solve a few problems and your clean / hint / solution split shows up here.</p>';
    host.innerHTML=
    '<div class="pgview">'+
      '<div class="pg-hd"><div>'+
        '<span class="pg-eyebrow">Your progress &middot; '+esc(COURSE_NAME)+'</span>'+
        '<h1 class="pg-title">How you&rsquo;re doing</h1>'+
        '<p class="pg-sub">'+read+'</p>'+
      '</div><div class="pg-ring" style="--p:'+avg+'%"><b>'+avg+'%</b><span>Mastery</span></div></div>'+
      '<div class="pg-tiles">'+tiles+'</div>'+
      '<div class="pg-cols">'+
        '<div class="pg-col">'+
          '<div class="pg-card"><h3>Mastery by topic</h3><div class="ch">Where you stand across every topic you&rsquo;ve practiced.</div>'+topicsHTML+'</div>'+
          '<div class="pg-card"><h3>How you solve</h3><div class="ch">Every graded solve, by how you got there &mdash; clean solves build the most mastery.</div>'+solveHTML+'</div>'+
          '<div class="pg-card"><h3>Accuracy over time</h3><div class="ch">How your solve accuracy is trending.</div><div class="mspark">'+chart+'</div><p class="pg-note">Preview &mdash; per-session accuracy starts logging as you go.</p></div>'+
        '</div>'+
        '<div class="pg-col">'+
          '<div class="pg-card"><h3>Question types you nail vs. miss</h3><div class="ch">The kinds of problems each topic throws at you.</div>'+qtHTML+qtNote+'</div>'+
          '<div class="pg-card"><h3>Strong &amp; where to focus</h3><div class="ch">Lean on your strengths; give these a little love.</div>'+
            '<div class="pg-two"><div><div class="pg-mini-h">Strongest</div>'+strongHTML+'</div>'+
            '<div><div class="pg-mini-h">Focus next</div>'+focusHTML+'</div></div></div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  function renderRail2(){
    var fresh=!Object.keys(state.done).length;
    var strengths=strengthCard();
    var first = strengths ? strengths
      : (fresh
        ? '<div class="rc"><h4>New here?</h4>'+
            '<p class="lead">Take a 2-minute check and we&rsquo;ll tune every lesson to your level, harder where you&rsquo;re strong and gentler where you&rsquo;re building. Or just dive in. Your strengths show up here as you solve.</p>'+
            '<a class="cta3d rc-cta" href="'+url('1.1')+'">Take the quick check</a></div>'
        : '<div class="rc"><h4>Where you are</h4>'+
            '<p class="lead">You&rsquo;re on <b>'+state.current+' &mdash; '+esc(lesOf(state.current).t)+'</b>. Solve a few problems and your strengths will show up here.</p>'+
            '<a class="cta3d rc-cta" href="'+url(state.current)+'">Continue&nbsp;<span aria-hidden="true">&rarr;</span></a></div>');
    document.getElementById('rail').innerHTML=
      first+
      '<div class="rc" id="dayCard"></div>'+
      '<div class="rc"><h4>Today&rsquo;s focus</h4>'+
        '<p class="lead">One lesson keeps the momentum. '+GUIDE+' is ready the moment you get stuck.</p>'+
        '<a class="cta3d rc-cta" href="'+url(state.current)+'">'+(fresh?'Start ':'Continue ')+state.current+'&nbsp;<span aria-hidden="true">&rarr;</span></a></div>';
    DayGrid.render();
  }

  function renderAll(){ renderRail(); renderContinue(); renderChapterCard(); renderTrail(); renderNextup(); renderRail2(); Garden.renderBar(); }
  function setChapter(n){ state.active=n; renderRail(); renderChapterCard(); renderTrail(); renderNextup(); window.scrollTo({top:0,behavior:'smooth'}); }

  // course dropdown toggle
  var sel=document.getElementById('coursesel'), cur=document.getElementById('courseCur');
  if(cur){ cur.addEventListener('click',function(e){ e.stopPropagation(); sel.classList.toggle('open'); }); }
  document.addEventListener('click',function(){ sel&&sel.classList.remove('open'); });

  // reflect the active course in the chrome (label, active menu item, avatar link, streak icon)
  if(cur && cur.firstChild && cur.firstChild.nodeType===3) cur.firstChild.nodeValue=COURSE_NAME+' ';
  document.title='Quantica · '+COURSE_NAME;
  [].forEach.call(document.querySelectorAll('.coursesel .menu a[data-c]'),function(a){ a.classList.toggle('on', a.getAttribute('data-c')===COURSE); });
  var _av=document.querySelector('.avatar'); if(_av) _av.setAttribute('href','/landing.html?course='+COURSE+'&start=1');
  var _si=document.querySelector('#streakPill span'); if(_si) _si.textContent=STREAK_ICO;
  if(IS_ALG){ var _bm=document.getElementById('brandMark'); if(_bm) _bm.innerHTML='<rect x="3" y="3" width="26" height="26" rx="9" fill="#1C5486"/><path d="M7 19c3-3 5.5-3 9 0 3.5 3 6 3 9 0" stroke="#7FC1EA" stroke-width="2.4" fill="none" stroke-linecap="round"/><path d="M8 13.5c2.7-2.6 5-2.6 8 0" stroke="#BFE2F7" stroke-width="2" fill="none" stroke-linecap="round" opacity=".85"/>'; }

  // load the real course structure, then render
  fetch('/lessons/'+COURSE+'/toc.json').then(function(r){ return r.json(); }).then(function(toc){
    state.chapters=toc;
    var prog=loadProgress();
    state.done=prog.done;
    state.skill=prog.skill;
    state.stats=prog.stats;
    state.typeSkill=prog.typeSkill;
    state.current=firstUndone();                 // the lesson the student is actually on
    state.active=(chOf(state.current)||toc[0]||{n:1}).n;
    DayGrid.init(prog.streak, prog.lastActive);
    Garden.init();
    if(prog.streak>0){ var sp=document.getElementById('streakPill'); if(sp){ sp.style.display=''; var b=sp.querySelector('b'); if(b) b.textContent=prog.streak; } }
    // Mastery ring: fill it with the average of this course's strength scores
    (function(){
      var pre=COURSE+':', vals=[];
      Object.keys(state.skill||{}).forEach(function(k){ if(k.indexOf(pre)===0){ var e=state.skill[k]; if(e&&e.n) vals.push(e.s); } });
      var ring=document.querySelector('.sig .ring'), sig=document.querySelector('.sig');
      if(ring && vals.length){
        var pct=Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length*100);
        ring.style.background='conic-gradient(var(--grass) '+pct+'%, var(--line) 0)';
        if(sig) sig.setAttribute('title','Average mastery across your '+COURSE_NAME+' skills: '+pct+'%');
      }
    })();
    document.getElementById('footNote').textContent='Quantica course home · '+COURSE_NAME+' · '+toc.length+' chapters, '+toc.reduce(function(s,c){return s+c.lessons.length;},0)+' lessons.';
    renderAll();
  }).catch(function(e){
    document.getElementById('chapterCard').innerHTML='<div class="csub">Could not load the course outline. Make sure the site is served over http (not opened as a file).</div>';
  });
})();
</script>
